      --surface: rgba(255,255,255,0.03);

      --border: rgba(255,255,255,0.08);
      --border-soft: rgba(255,255,255,0.05);
      --text: #f7f8f8;
      --text-2: #d0d6e0;
      --text-3: #8a8f98;
      --brand: #7c3aed;
      --brand-2: #9b5cff;
      --good: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
      --chip: rgba(124,58,237,0.16);
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: radial-gradient(circle at top, rgba(124,58,237,.18), transparent 30%), var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
    body { -webkit-font-smoothing: antialiased; }
    a { color: inherit; }
    .wrap { width: min(1280px, calc(100% - 32px)); margin: 0 auto; }
    header { position: sticky; top: 0; z-index: 10; backdrop-filter: blur(14px); background: rgba(8,9,10,.78); border-bottom: 1px solid var(--border-soft); }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; gap: 16px; }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; letter-spacing: -.4px; }
    .brand-badge { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--brand), #5e6ad2); display: grid; place-items: center; box-shadow: var(--shadow); }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .hero { padding: 18px 0 12px; display: grid; grid-template-columns: 1fr; gap: 12px; }
    .card { background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
    .hero-card, .panel, .kpi { padding: 16px; }
    h1 { margin: 0; font-size: clamp(24px, 5vw, 34px); line-height: 1.04; letter-spacing: -.8px; }
    .meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .chip { padding: 10px 14px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--text-2); font-size: 13px; }
    .hero-side { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    .kpi h3, .section-title { margin: 0 0 10px; font-size: 16px; color: var(--text-2); font-weight: 600; letter-spacing: -.2px; }
    .teams { font-size: 18px; font-weight: 700; letter-spacing: -.5px; }
    .small { font-size: 12px; color: var(--text-3); }
    .section { margin-top: 16px; }
    .section-head { display: flex; justify-content: space-between; align-items: end; gap: 12px; margin-bottom: 10px; }
    .section-head p { margin: 0; color: var(--text-3); }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 12px; }
    .input, .select, .btn-toggle { background: rgba(255,255,255,.03); border: 1px solid var(--border); color: var(--text); border-radius: 12px; padding: 12px 14px; font-size: 14px; }
    .input { min-width: 260px; flex: 1; }
    .btn-toggle { cursor: pointer; padding: 10px 14px; }
    .btn-toggle.active { background: rgba(124,58,237,.22); border-color: rgba(155,92,255,.45); color: #e9dcff; }
    .schedule-controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
    .schedule-scroll { max-height: 420px; overflow: auto; display:grid; gap:10px; padding-right: 2px; }
    .match { padding: 14px; border: 1px solid var(--border-soft); border-radius: 14px; background: rgba(255,255,255,0.02); display: grid; gap: 7px; }
    .match-top { display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .match-meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .status { font-size: 12px; padding: 6px 10px; border-radius: 999px; background: var(--chip); color: #cbb8ff; border: 1px solid rgba(155,92,255,.35); }
    .status.done { background: rgba(16,185,129,.12); color: #7bf0bf; border-color: rgba(16,185,129,.3); }
    .status.soon { background: rgba(245,158,11,.12); color: #ffd081; border-color: rgba(245,158,11,.3); }
    .ticket-chip { font-size: 12px; padding: 6px 10px; border-radius: 999px; border: 1px solid rgba(124,58,237,.22); background: rgba(255,255,255,.04); color: var(--text-2); }
    .ticket-chip.ready { border-color: rgba(16,185,129,.3); color: #7bf0bf; background: rgba(16,185,129,.12); }
    .ticket-chip.pending { border-color: rgba(245,158,11,.3); color: #ffd081; background: rgba(245,158,11,.12); }
    .ticket-link { color: #d9c9ff; text-decoration: none; }
    .ticket-link:hover { text-decoration: underline; }
    .muted { color: var(--text-3); }
    .reserve-meta { color: #b8a5ef; }
    .calendar-wrap { display:none; }
    .calendar-wrap.active, .list-wrap.active { display:block; }
    .month-nav { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
    .month-title { font-size:16px; font-weight:700; }
    .month-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
    .weekday, .day { border-radius: 14px; }
    .weekday { padding: 10px 4px; text-align:center; color: var(--text-3); font-size: 12px; border: 1px solid transparent; }
    .day { min-height: 106px; padding: 10px; border: 1px solid var(--border-soft); background: rgba(255,255,255,.02); display:flex; flex-direction:column; gap:6px; }
    .day.empty { background: transparent; border-color: transparent; }
    .day-num { font-size: 12px; color: var(--text-2); font-weight: 600; }
    .day-match { padding: 6px 7px; border-radius: 10px; background: rgba(124,58,237,.14); border: 1px solid rgba(124,58,237,.2); font-size: 11px; line-height: 1.35; color: var(--text); }
    .day-match.done { background: rgba(16,185,129,.12); border-color: rgba(16,185,129,.22); }
    .day-match.away { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.08); }
    table { width: 100%; border-collapse: collapse; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 16px; border: 1px solid var(--border); }
    .table-scroll table { min-width: 760px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid var(--border-soft); text-align: left; font-size: 14px; }
    th { color: var(--text-3); font-weight: 600; position: sticky; top: 0; background: rgba(15,16,17,.95); backdrop-filter: blur(8px); }
    tbody tr:hover { background: rgba(255,255,255,.02); }
    .rank-row { background: rgba(124,58,237,.08); }
    .players-wrap { max-height: 720px; overflow: auto; border-radius: 16px; border: 1px solid var(--border); }
    .players-wrap table { min-width: 860px; }
    .players-wrap th:nth-child(3), .players-wrap td:nth-child(3) { width: 42px; min-width: 42px; max-width: 42px; white-space: nowrap; padding-left: 6px; padding-right: 6px; }
    .right { text-align:right; }
    footer { padding: 18px 0 36px; color: var(--text-3); }
    @media (max-width: 980px) {
      .hero-side { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .wrap { width: min(100% - 20px, 1280px); }
      .hero-card, .panel, .kpi { padding: 14px; }
      .hero-side { grid-template-columns: 1fr; }
      .teams { font-size: 16px; }
      .month-grid { gap:6px; }
      .day { min-height: 88px; padding: 8px; }
      .day-match { font-size: 10px; padding: 5px 6px; }
      th, td { padding: 10px 8px; font-size: 13px; }
      .input { min-width: 100%; }
      .players-wrap { max-height: none; }
      .schedule-scroll { max-height: 60vh; }
    }
  </style>
</head>

    const rankingBody = document.getElementById('rankingBody');
    ranking.forEach(row => {
      const tr = document.createElement('tr');
      if (row.club === '안양') tr.className = 'rank-row';
      tr.innerHTML = `<td>${row.rank}</td><td>${row.club}</td><td>${row.games}</td><td>${row.points}</td><td>${row.win}</td><td>${row.draw}</td><td>${row.loss}</td><td>${row.goals}</td><td>${row.against}</td><td>${row.diff}</td>`;
      rankingBody.appendChild(tr);
    });

    const anyangRank = ranking.find(r => r.club === '안양');
    if (anyangRank) {
      document.getElementById('rankChip').textContent = `현재 ${anyangRank.rank}위`;
    }
    document.getElementById('scheduleCountChip').textContent = `전체 일정 ${schedule.length}경기`;
    const completedMatches = schedule.filter(m => m.status === '종료');
    const upcomingMatches = schedule.filter(m => m.status !== '종료');
    const recentMatch = completedMatches[completedMatches.length - 1];
    const nextMatch = upcomingMatches[0];
    if (recentMatch) {
      document.getElementById('recentMatchTitle').textContent = `${recentMatch.home} ${recentMatch.homeGoal} : ${recentMatch.awayGoal} ${recentMatch.away}`;
      document.getElementById('recentMatchDate').textContent = recentMatch.date;
    }
    if (nextMatch) {
      document.getElementById('nextMatchTitle').textContent = `${nextMatch.home} vs ${nextMatch.away}`;
      document.getElementById('nextMatchDate').textContent = `${nextMatch.date} ${nextMatch.time}`;
    }

    const scheduleList = document.getElementById('scheduleList');
    const monthFilter = document.getElementById('monthFilter');
    const monthTitle = document.getElementById('monthTitle');
    const calendarGrid = document.getElementById('calendarGrid');
    const listWrap = document.getElementById('listWrap');
    const calendarWrap = document.getElementById('calendarWrap');
    const listViewBtn = document.getElementById('listViewBtn');
    const calendarViewBtn = document.getElementById('calendarViewBtn');
    const prevMonthBtn = document.getElementById('prevMonthBtn');
    const nextMonthBtn = document.getElementById('nextMonthBtn');

    const months = [...new Set(schedule.map(m => m.date.slice(0,7)))];
    let currentMonth = months.includes('2026.04') ? '2026.04' : months[0];

    function formatMatchTitle(match) {
      const score = match.status === '종료' ? `${match.homeGoal} : ${match.awayGoal}` : 'vs';
      return `${match.home} ${score} ${match.away}`;
    }

    function getTicketProviderLabel(match) {
      if (match.ticketProvider === 'T') return '티켓링크';
      if (match.ticketProvider === 'I') return '인터파크';
      return '';
    }

    function getTicketUrl(match) {
      if (match.externalUrl) return match.externalUrl;
      if (match.ticketProvider === 'T' && match.goodsCode) {
        return `https://facility.ticketlink.co.kr/facility/direct/member/seat?partnerNo=5NIl4PaZg%2BpIYAPEQvgb9Q%3D%3D&memberIdEnc=&scheduleId=${match.goodsCode}`;
      }
      return '';
    }

    function getTicketBadge(match) {
      if (match.status === '종료' || match.home !== '안양') return null;
      const provider = getTicketProviderLabel(match);
      const url = getTicketUrl(match);
      if (url) {
        return { text: provider ? `${provider} 예매하기` : '예매하기', className: 'ready', url };
      }
      if (provider) {
        return { text: `${provider} 준비중`, className: 'pending', url: '' };
      }
      if (match.ticketStatus) {
        return { text: String(match.ticketStatus), className: 'pending', url: '' };
      }
      return { text: '예매정보 확인중', className: 'pending', url: '' };
    }

    function getReserveMeta(match) {
      if (match.status === '종료' || match.home !== '안양' || !match.reserveOpenLabel) return '';
      return `예매 오픈 ${match.reserveOpenLabel}`;
    }

    function renderMonthOptions() {
      monthFilter.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
      monthFilter.value = currentMonth;
    }

    function renderScheduleList() {
      scheduleList.innerHTML = schedule.map(match => {
        const ticketBadge = getTicketBadge(match);
        const reserveMeta = getReserveMeta(match);
        const ticketMeta = ticketBadge
          ? ticketBadge.url
            ? `<a class="ticket-chip ${ticketBadge.className} ticket-link" href="${ticketBadge.url}" target="_blank" rel="noreferrer">${ticketBadge.text}</a>`
            : `<span class="ticket-chip ${ticketBadge.className}">${ticketBadge.text}</span>`
          : '';
        return `
        <div class="match">
          <div class="match-top">
            <div class="match-meta">
              <span class="status ${match.status === '종료' ? 'done' : 'soon'}">${match.status}</span>
              ${ticketMeta}
            </div>
            <span class="small">${match.date} · R${match.round}</span>
          </div>
          <div class="teams">${formatMatchTitle(match)}</div>
          <div class="muted">${match.time} · ${match.venueFull ?? venueFullNames[match.venue] ?? match.venue}${match.home === '안양' ? '' : ` · ${venueDistanceKm[match.venue]?.toFixed(1) ?? '-'}km`}</div>
          ${reserveMeta ? `<div class="small reserve-meta">${reserveMeta}</div>` : ''}
        </div>
      `;
      }).join('');

      requestAnimationFrame(() => {
        const completed = scheduleList.querySelectorAll('.match .status.done');
        const lastCompleted = completed[completed.length - 1]?.closest('.match');
        if (lastCompleted) {
          const itemRect = lastCompleted.getBoundingClientRect();
          const containerRect = scheduleList.getBoundingClientRect();
          const delta = itemRect.top - containerRect.top - 8;
          scheduleList.scrollTop += delta;
        }
      });
    }

    function renderCalendar() {
      const [yearStr, monthStr] = currentMonth.split('.');
      const year = Number(yearStr);
      const month = Number(monthStr);
      const first = new Date(year, month - 1, 1);
      const lastDay = new Date(year, month, 0).getDate();
      const startDay = first.getDay();
      monthTitle.textContent = `${year}년 ${month}월`;

      const monthMatches = schedule.filter(m => m.date.startsWith(currentMonth));
      const byDay = Object.fromEntries(monthMatches.map(m => [Number(m.date.slice(8,10)), m]));

      const weekdays = ['일','월','화','수','목','금','토'];
      calendarGrid.innerHTML = weekdays.map(d => `<div class="weekday">${d}</div>`).join('');

      for (let i = 0; i < startDay; i++) {
        calendarGrid.innerHTML += `<div class="day empty"></div>`;
      }

      for (let day = 1; day <= lastDay; day++) {
        const match = byDay[day];
        if (!match) {
          calendarGrid.innerHTML += `<div class="day"><div class="day-num">${day}</div></div>`;
          continue;
        }
        const home = match.home === '안양';
        calendarGrid.innerHTML += `
          <div class="day">
            <div class="day-num">${day}</div>
            <div class="day-match ${match.status === '종료' ? 'done' : ''} ${home ? 'home' : 'away'}">
              <div>${match.time}</div>
              <div>${home ? '안양 vs ' + match.away : match.home + ' vs 안양'}</div>
              <div>${match.status === '종료' ? `${match.homeGoal}:${match.awayGoal}` : '예정'}</div>
            </div>
          </div>
        `;
      }
    }

    function switchView(mode) {
      const list = mode === 'list';
      listWrap.classList.toggle('active', list);
      calendarWrap.classList.toggle('active', !list);
      listViewBtn.classList.toggle('active', list);
      calendarViewBtn.classList.toggle('active', !list);
      monthFilter.style.display = 'none';
    }

    function setMonth(newMonth) {
      currentMonth = newMonth;
      monthFilter.value = currentMonth;
      renderScheduleList();
      renderCalendar();
    }

    renderMonthOptions();
    renderScheduleList();
    renderCalendar();

    monthFilter.addEventListener('change', e => setMonth(e.target.value));
    listViewBtn.addEventListener('click', () => switchView('list'));
    calendarViewBtn.addEventListener('click', () => switchView('calendar'));
    prevMonthBtn.addEventListener('click', () => {
      const idx = months.indexOf(currentMonth);
      if (idx > 0) setMonth(months[idx - 1]);
    });
    nextMonthBtn.addEventListener('click', () => {
      const idx = months.indexOf(currentMonth);
      if (idx < months.length - 1) setMonth(months[idx + 1]);
    });

    const playersBody = document.getElementById('playersBody');
    const searchInput = document.getElementById('searchInput');
    const posFilter = document.getElementById('posFilter');

    function renderPlayers() {
      const keyword = searchInput.value.trim();
      const pos = posFilter.value;
      const filtered = players.filter(p => (pos === 'ALL' || p.pos === pos) && (!keyword || p.name.includes(keyword)));
      playersBody.innerHTML = filtered.map(p => `
        <tr>
          <td>${p.no}</td>
          <td><strong>${p.name}</strong></td>
          <td>${p.pos}</td>
          <td class="right mono">${p.s2026}</td>
          <td class="right mono">${p.career}</td>
          <td>${p.birth}</td>
          <td>${p.nation}</td>
        </tr>
      `).join('');
    }

    searchInput.addEventListener('input', renderPlayers);
    posFilter.addEventListener('change', renderPlayers);
    renderPlayers();
  </script>
